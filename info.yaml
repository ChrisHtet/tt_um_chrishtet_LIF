# Tiny Tapeout project information
project:
  title:        "Leaky Integrate and Fire Neuron"      # Project title
  author:       "Chris Htet"      # Your name
  discord:      "ChrisHtet"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Fixed-point accumulator with leak (v ← v − v/τ + I) and a comparator to fire a spike when v ≥ θ, and logic to reset v."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2
  top_module:  "tt_um_chrishtet_LIF"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "lif_neuron.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "I_Q4_4[0] (LSB)"
  ui[1]: "I_Q4_4[1]"
  ui[2]: "I_Q4_4[2]"
  ui[3]: "I_Q4_4[3]"
  ui[4]: "I_Q4_4[4] (fractional)"
  ui[5]: "I_Q4_4[5] (fractional)"
  ui[6]: "I_Q4_4[6] (fractional)"
  ui[7]: "I_Q4_4[7] (sign bit)"

  # Outputs
  uo[0]: "SPIKE (1-cycle pulse)"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: "V_DBG[0] (V MSB nibble, bit 4)"
  uo[5]: "V_DBG[1] (bit 5)"
  uo[6]: "V_DBG[2] (bit 6)"
  uo[7]: "V_DBG[3] (bit 7, MSB)"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
